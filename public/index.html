<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<!-- فونت حرفه‌ای -->
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Vazirmatn', sans-serif;
  background:linear-gradient(180deg,#020617,#020617,#0f172a);
  color:white;
  direction:rtl;
}

.container{
  max-width:420px;
  margin:auto;
  padding:15px;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:15px;
}

.logo{
  font-size:22px;
  font-weight:700;
}

.secure{
  font-size:12px;
  color:#94a3b8;
}

/* BANNER */
.banner{
  background:linear-gradient(90deg,#22c55e,#16a34a);
  padding:12px;
  border-radius:12px;
  text-align:center;
  font-size:13px;
  margin-bottom:10px;
}

/* CARD */
.card{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:15px;
  border-radius:16px;
  margin-top:12px;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:8px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:scale(0.97);
}

.primary{
  background:linear-gradient(90deg,#22c55e,#16a34a);
}

.secondary{
  background:#1e293b;
}

/* PLAN */
.plans{
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* CRYPTO */
.crypto-box{
  margin-top:12px;
  padding-top:10px;
  border-top:1px solid #334155;
  font-size:13px;
}

.wallet{
  background:#020617;
  padding:8px;
  border-radius:8px;
  font-size:12px;
  margin-top:5px;
}

.copy-btn{
  color:#22c55e;
  font-size:12px;
  margin-top:5px;
}

.qr{
  margin-top:8px;
  background:white;
  padding:6px;
  border-radius:10px;
  display:flex;
  justify-content:center;
}

/* INPUT */
input,textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #334155;
  background:#020617;
  color:white;
  margin-top:8px;
}

/* FOOTER */
.footer{
  margin-top:10px;
  font-size:12px;
  color:#94a3b8;
  text-align:center;
}

/* SOCIAL BUTTONS */
.socials{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.socials a{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:10px;
  text-decoration:none;
  font-size:13px;
}

.support{
  background:#1e293b;
  color:white;
}

.channel{
  background:#22c55e;
  color:black;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<div class="logo">🚀 Nova VPN</div>
<div class="secure">اتصال امن | سرعت بالا | بدون قطعی</div>
</div>

<div class="banner">
🔥 سرویس استارلینک واقعی | بدون قطعی | تست شده
</div>

<!-- PLANS -->
<div class="card">
<h3>💎 انتخاب پلن VIP</h3>
<div class="plans" id="plans"></div>
</div>

<!-- CRYPTO -->
<div class="card">
<h3>💰 پرداخت سریع با ارز دیجیتال</h3>

<div id="selectedPlan">یک پلن انتخاب کنید</div>
<div id="crypto"></div>

<div class="footer">
⚠️ مبلغ دقیق ارسال شود — کارمزد با شماست
</div>
</div>

<!-- PAYMENT -->
<div class="card">
<h3>📤 ثبت پرداخت</h3>

<input id="tx" placeholder="TX HASH">
<textarea id="desc" placeholder="توضیحات (اختیاری)"></textarea>

<button class="primary" onclick="send()">ثبت پرداخت</button>
</div>

<!-- SOCIAL -->
<div class="card">

<h3>📢 ارتباط با ما</h3>

<div class="socials">
<a class="support" href="https://t.me/NovaVPN_Sup">پشتیبانی</a>
<a class="channel" href="https://t.me/NovaVPN_Net">کانال</a>
</div>

</div>

</div>

<script>

const wallets={
TRX:"TSgfCoCsrEXJs6RKkaCJF64wXpYVTRejZ3",
TON:"UQCpWdG73bwuwFAp2EDQLLkl6VhTGpVVJDre8X02qvJ5OJem",
USDT:"TSgfCoCsrEXJs6RKkaCJF64wXpYVTRejZ3",
XRP:"rJ8A6gUZzwXm9XJv2fLaTGd6GkpBMdmm8F"
}

const plans=[
{name:"۱ گیگ",price:8.78},
{name:"۲ گیگ",price:17.04},
{name:"۳ گیگ",price:24.43},
{name:"۴ گیگ",price:32.80},
{name:"۵ گیگ",price:47.59}
]

let prices={}

async function loadPrices(){
let r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=tether,tron,the-open-network,ripple&vs_currencies=usd")
let d=await r.json()

prices={
USDT:d.tether.usd,
TRX:d.tron.usd,
TON:d["the-open-network"].usd,
XRP:d.ripple.usd
}
}

function renderPlans(){
let html=""
plans.forEach(p=>{
html+=`<button class="secondary" onclick="selectPlan(${p.price},'${p.name}')">${p.name} - $${p.price}</button>`
})
document.getElementById("plans").innerHTML=html
}

function copy(text){
navigator.clipboard.writeText(text)
alert("کپی شد")
}

function selectPlan(price,name){

document.getElementById("selectedPlan").innerHTML=
`پلن انتخابی: ${name} - $${price}`

let html=""

for(let c in prices){

let amount=(price/prices[c]).toFixed(2)

html+=`
<div class="crypto-box">

<b>${c}</b><br>
مقدار: ${amount}

<div class="wallet">${wallets[c]}</div>

<div class="copy-btn" onclick="copy('${wallets[c]}')">📋 کپی آدرس</div>

<div class="qr" id="qr_${c}"></div>

</div>
`
}

document.getElementById("crypto").innerHTML=html

for(let c in wallets){
QRCode.toCanvas(document.getElementById("qr_"+c), wallets[c])
}

}

async function send(){

let tx=document.getElementById("tx").value

if(!tx){
alert("TX HASH را وارد کنید")
return
}

await fetch("/api/submitReceipt",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({chat_id:1,image:tx})
})

alert("ثبت شد")
}

renderPlans()
loadPrices()

</script>

</body>
</html>
