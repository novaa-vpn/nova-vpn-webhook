<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:white;
  direction:rtl;
}

.container{
  max-width:420px;
  margin:auto;
  padding:15px;
}

/* header */
.header{
  text-align:center;
  margin-bottom:10px;
}

.header h2{
  margin:0;
  font-size:20px;
}

.secure{
  font-size:12px;
  color:#94a3b8;
}

/* card */
.card{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:15px;
  border-radius:14px;
  margin-top:12px;
}

/* buttons */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:8px;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
}

.primary{
  background:linear-gradient(90deg,#22c55e,#16a34a);
}

.secondary{
  background:#1e293b;
}

/* plan grid */
.plans{
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* crypto box */
.crypto-box{
  margin-top:12px;
  padding-top:10px;
  border-top:1px solid #334155;
  font-size:13px;
  line-height:1.6;
  word-break:break-word;
}

/* wallet */
.wallet{
  background:#020617;
  padding:8px;
  border-radius:8px;
  font-size:12px;
  margin-top:5px;
  overflow-wrap:anywhere;
}

/* copy */
.copy-btn{
  font-size:12px;
  color:#22c55e;
  margin-top:5px;
  cursor:pointer;
}

/* qr */
.qr{
  margin-top:10px;
  background:white;
  padding:6px;
  border-radius:10px;
  display:flex;
  justify-content:center;
}

/* input */
input,textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #334155;
  background:#020617;
  color:white;
  margin-top:8px;
}

/* footer */
.footer{
  margin-top:15px;
  font-size:12px;
  color:#94a3b8;
  line-height:1.6;
  text-align:center;
}

a{
  color:#22c55e;
  text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>🔐 پنل امن VPN</h2>
<div class="secure">اتصال رمزگذاری شده و ایمن</div>
</div>

<!-- plans -->
<div class="card">
<h3>💎 انتخاب پلن</h3>
<div class="plans" id="plans"></div>
</div>

<!-- crypto -->
<div class="card">
<h3>💰 پرداخت با ارز دیجیتال</h3>

<div id="selectedPlan">یک پلن انتخاب کنید</div>
<div id="crypto"></div>

<div class="footer">
⚠️ مبلغ دقیق را ارسال کنید — کارمزد بر عهده شماست  
</div>
</div>

<!-- payment -->
<div class="card">
<h3>📤 ارسال پرداخت</h3>

<input id="tx" placeholder="TX HASH">
<textarea id="desc" placeholder="توضیحات (اختیاری)"></textarea>

<button class="primary" onclick="send()">ارسال اطلاعات پرداخت</button>
</div>

<!-- support -->
<div class="card">
<h3>📞 پشتیبانی</h3>

<div class="footer">
<a href="https://t.me/NovaVPN_Sup">پشتیبانی</a><br>
<a href="https://t.me/NovaVPN_Net">کانال رسمی</a>
</div>

</div>

</div>

<script>

const wallets={
TRX:"TSgfCoCsrEXJs6RKkaCJF64wXpYVTRejZ3",
TON:"UQCpWdG73bwuwFAp2EDQLLkl6VhTGpVVJDre8X02qvJ5OJem",
USDT:"TSgfCoCsrEXJs6RKkaCJF64wXpYVTRejZ3",
XRP:"rJ8A6gUZzwXm9XJv2fLaTGd6GkpBMdmm8F"
}

const plans=[
{name:"۱ گیگ",price:8.78},
{name:"۲ گیگ",price:17.04},
{name:"۳ گیگ",price:24.43},
{name:"۴ گیگ",price:32.80},
{name:"۵ گیگ",price:47.59}
]

let prices={}

// load prices
async function loadPrices(){
let r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=tether,tron,the-open-network,ripple&vs_currencies=usd")
let d=await r.json()

prices={
USDT:d.tether.usd,
TRX:d.tron.usd,
TON:d["the-open-network"].usd,
XRP:d.ripple.usd
}
}

// render plans
function renderPlans(){
let html=""
plans.forEach(p=>{
html+=`<button class="secondary" onclick="selectPlan(${p.price},'${p.name}')">${p.name} - $${p.price}</button>`
})
document.getElementById("plans").innerHTML=html
}

// copy
function copy(text){
navigator.clipboard.writeText(text)
alert("کپی شد")
}

// select plan
function selectPlan(price,name){

document.getElementById("selectedPlan").innerHTML=
`پلن انتخابی: ${name} - $${price}`

let html=""

for(let c in prices){

let amount=(price/prices[c]).toFixed(2)

html+=`
<div class="crypto-box">

<b>${c}</b><br>
مقدار: ${amount}

<div class="wallet">${wallets[c]}</div>

<div class="copy-btn" onclick="copy('${wallets[c]}')">📋 کپی آدرس</div>

<div class="qr" id="qr_${c}"></div>

</div>
`
}

document.getElementById("crypto").innerHTML=html

// generate QR
for(let c in wallets){
QRCode.toCanvas(document.getElementById("qr_"+c), wallets[c])
}

}

// send
async function send(){

let tx=document.getElementById("tx").value
let desc=document.getElementById("desc").value

if(!tx){
alert("TX HASH را وارد کنید")
return
}

await fetch("/api/submitReceipt",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:1,
image:tx,
desc:desc
})
})

alert("ارسال شد")
}

renderPlans()
loadPrices()

</script>

</body>
</html>
