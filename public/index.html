<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
  font-family: sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
  margin:0;
  text-align:center;
  transition:0.3s;
}

/* 🌍 RTL / LTR */
body.rtl{
  direction: rtl;
  text-align: right;
}

body.ltr{
  direction: ltr;
  text-align: left;
}

/* container */
.container{
  max-width:400px;
  margin:auto;
}

/* title */
h2{
  text-align:center;
}

/* card */
.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-top:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* buttons */
button{
  background:#22c55e;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  width:100%;
  font-size:15px;
}

button:hover{
  opacity:0.9;
}

/* language buttons */
.langs{
  display:flex;
  justify-content:center;
  gap:10px;
}

.lang-btn{
  background:#334155;
  width:auto;
  padding:8px 12px;
}

/* input */
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  box-sizing:border-box;
}

</style>

</head>

<body>

<div class="container">

<h2>🚀 VPN Panel</h2>

<!-- 🌍 language -->
<div class="langs">
<button class="lang-btn" onclick="setLang('fa')">🇮🇷</button>
<button class="lang-btn" onclick="setLang('en')">🇺🇸</button>
</div>

<!-- 👤 profile -->
<div class="card">
<div id="info">Loading...</div>
<button onclick="openSub()" id="subBtn">Open</button>
</div>

<!-- 💰 buy -->
<div class="card">

<h3 id="buyTitle">Buy</h3>

<button onclick="buyPlan('1month')" id="plan1"></button>
<button onclick="buyPlan('3month')" id="plan3"></button>

<input type="text" id="receiptInput">
<button onclick="sendReceipt()" id="sendReceiptBtn"></button>

</div>

</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

const user = tg.initDataUnsafe.user || { id: 1 }

let subLink = null
let lang = localStorage.getItem("lang") || "en"

// 🌍 texts
const texts = {
  en:{
    loading:"Loading...",
    balance:"Balance",
    sub:"Subscription",
    noSub:"Not available",
    open:"Open Subscription",
    noSubAlert:"No subscription yet",
    buy:"Buy Subscription",
    plan1:"1 Month Plan",
    plan3:"3 Month Plan",
    receiptPlaceholder:"Receipt image URL",
    sendReceipt:"Send Receipt",
    orderOk:"Order registered",
    receiptOk:"Receipt sent",
    receiptError:"Enter receipt link"
  },
  fa:{
    loading:"در حال لود...",
    balance:"موجودی",
    sub:"اشتراک",
    noSub:"ندارد",
    open:"مشاهده اشتراک",
    noSubAlert:"هنوز اشتراک ثبت نشده",
    buy:"خرید اشتراک",
    plan1:"پلن ۱ ماهه",
    plan3:"پلن ۳ ماهه",
    receiptPlaceholder:"لینک عکس رسید",
    sendReceipt:"ارسال رسید",
    orderOk:"سفارش ثبت شد",
    receiptOk:"رسید ارسال شد",
    receiptError:"لینک رسید را وارد کنید"
  }
}

function t(key){
  return texts[lang][key]
}

// 🌍 تغییر زبان
function setLang(l){
  lang = l
  localStorage.setItem("lang", l)
  applyDirection()
  renderTexts()
  load()
}

// 🔥 RTL FIX
function applyDirection(){
  if(lang === "fa"){
    document.body.classList.remove("ltr")
    document.body.classList.add("rtl")
  }else{
    document.body.classList.remove("rtl")
    document.body.classList.add("ltr")
  }
}

// 🎨 texts
function renderTexts(){

document.getElementById("buyTitle").innerText = t("buy")
document.getElementById("plan1").innerText = t("plan1")
document.getElementById("plan3").innerText = t("plan3")
document.getElementById("sendReceiptBtn").innerText = t("sendReceipt")
document.getElementById("receiptInput").placeholder = t("receiptPlaceholder")
document.getElementById("subBtn").innerText = t("open")

}

// 🚀 load
async function load(){

document.getElementById("info").innerHTML = t("loading")

let res = await fetch("/api/profile?chat_id="+user.id)
let data = await res.json()

subLink = data.sub_link

document.getElementById("info").innerHTML =
"💰 "+t("balance")+": "+(data.balance ?? 0) +
"<br>🔗 "+t("sub")+": "+(data.sub_link ?? t("noSub"))

}

// 🔗 open sub
function openSub(){

if(!subLink){
alert(t("noSubAlert"))
return
}

window.open(subLink,"_blank")

}

// 💰 buy
async function buyPlan(plan){

await fetch("/api/buy",{
  method:"POST",
  headers:{
    "Content-Type":"application/json"
  },
  body:JSON.stringify({
    chat_id:user.id,
    plan:plan
  })
})

alert(t("orderOk"))

}

// 📤 receipt
async function sendReceipt(){

let img = document.getElementById("receiptInput").value

if(!img){
alert(t("receiptError"))
return
}

await fetch("/api/submitReceipt",{
  method:"POST",
  headers:{
    "Content-Type":"application/json"
  },
  body:JSON.stringify({
    chat_id:user.id,
    image:img
  })
})

alert(t("receiptOk"))

}

// init
applyDirection()
renderTexts()
load()

</script>

</body>
</html>
