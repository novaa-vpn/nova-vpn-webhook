<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  font-family: sans-serif;
  background: linear-gradient(180deg,#0f172a,#020617);
  color:white;
  margin:0;
  padding:20px;
}

body.rtl{direction:rtl;}
body.ltr{direction:ltr;}

.container{
  max-width:420px;
  margin:auto;
}

.header{
  text-align:center;
}

.secure{
  font-size:13px;
  color:#94a3b8;
}

.card{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:18px;
  border-radius:16px;
  margin-top:15px;
}

button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
  font-size:14px;
  font-weight:bold;
}

.primary{
  background:linear-gradient(90deg,#22c55e,#16a34a);
}

.secondary{
  background:#1e293b;
}

.langs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px 0;
}

.lang-btn{
  background:#1e293b;
  padding:6px 10px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #334155;
  background:#020617;
  color:white;
  margin-top:10px;
}

.note{
  font-size:12px;
  color:#94a3b8;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>🔐 VPN Secure Panel</h2>
<div class="secure" id="secureText"></div>
</div>

<div class="langs">
<button class="lang-btn" onclick="setLang('fa')">🇮🇷</button>
<button class="lang-btn" onclick="setLang('en')">🇺🇸</button>
</div>

<div class="card">
<div id="info"></div>
<button class="primary" onclick="openSub()" id="subBtn"></button>
</div>

<div class="card">
<h3 id="plansTitle"></h3>
<div id="plans"></div>
</div>

<div class="card">
<h3 id="cryptoTitle"></h3>

<div id="selectedPlan">-</div>
<div id="cryptoResult"></div>

<div class="note" id="cryptoNote"></div>
</div>

<div class="card">
<input type="text" id="receiptInput">
<button class="primary" onclick="sendReceipt()" id="sendReceiptBtn"></button>
</div>

</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

const user = tg.initDataUnsafe.user || { id: 1 }

let lang = localStorage.getItem("lang") || "en"
let subLink = null
let prices = {}

// 🌍 texts
const texts = {
  en:{
    secure:"Secure & Encrypted Connection",
    loading:"Loading...",
    balance:"Balance",
    sub:"Subscription",
    active:"Active",
    inactive:"Inactive",
    open:"Open Dashboard",
    plans:"VIP Plans",
    crypto:"Crypto Payment",
    note:"⚠ Send exact amount. Network fees are your responsibility. TX HASH required.",
    receipt:"Submit TX HASH",
    receiptPlaceholder:"Enter TX HASH",
    success:"Submitted successfully"
  },
  fa:{
    secure:"اتصال امن و رمزگذاری شده",
    loading:"در حال لود...",
    balance:"موجودی",
    sub:"وضعیت اشتراک",
    active:"فعال",
    inactive:"غیرفعال",
    open:"ورود به پنل",
    plans:"پلن‌های VIP",
    crypto:"پرداخت با ارز دیجیتال",
    note:"⚠ مبلغ دقیق را ارسال کنید. کارمزد بر عهده شماست. ارسال TX HASH الزامی است.",
    receipt:"ارسال TX HASH",
    receiptPlaceholder:"TX HASH را وارد کنید",
    success:"با موفقیت ثبت شد"
  }
}

function t(k){ return texts[lang][k] }

function setLang(l){
  lang = l
  localStorage.setItem("lang", l)
  applyDir()
  renderTexts()
}

function applyDir(){
  document.body.className = lang === "fa" ? "rtl" : "ltr"
}

function renderTexts(){
  document.getElementById("secureText").innerText = t("secure")
  document.getElementById("subBtn").innerText = t("open")
  document.getElementById("plansTitle").innerText = t("plans")
  document.getElementById("cryptoTitle").innerText = t("crypto")
  document.getElementById("cryptoNote").innerText = t("note")
  document.getElementById("sendReceiptBtn").innerText = t("receipt")
  document.getElementById("receiptInput").placeholder = t("receiptPlaceholder")
}

async function loadProfile(){
  let res = await fetch("/api/profile?chat_id="+user.id)
  let data = await res.json()

  subLink = data.sub_link

  let status = subLink ? t("active") : t("inactive")

  document.getElementById("info").innerHTML =
  "💰 "+t("balance")+": "+(data.balance||0)+"<br>"+
  "🔗 "+t("sub")+": "+status
}

function openSub(){
  if(!subLink) return alert("No active subscription")
  window.open(subLink,"_blank")
}

// 💎 wallets
const wallets = {
  TRX:"TSgfCoCsrEXJs6RKkaCJF64wXpYVTRejZ3",
  TON:"UQCpWdG73bwuwFAp2EDQLLkl6VhTGpVVJDre8X02qvJ5OJem",
  USDT:"TSgfCoCsrEXJs6RKkaCJF64wXpYVTRejZ3",
  XRP:"rJ8A6gUZzwXm9XJv2fLaTGd6GkpBMdmm8F"
}

// 💰 plans
const plans = [
  {name:"1GB", price:8.78},
  {name:"2GB", price:17.04},
  {name:"3GB", price:24.43},
  {name:"4GB", price:32.80},
  {name:"5GB", price:47.59}
]

function renderPlans(){
  let html=""
  plans.forEach(p=>{
    html+=`<button class="secondary" onclick="selectPlan(${p.price},'${p.name}')">${p.name} - $${p.price}</button>`
  })
  document.getElementById("plans").innerHTML=html
}

async function loadPrices(){
  let r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=tether,tron,the-open-network,ripple&vs_currencies=usd")
  let d=await r.json()

  prices={
    USDT:d.tether.usd,
    TRX:d.tron.usd,
    TON:d["the-open-network"].usd,
    XRP:d.ripple.usd
  }
}

function selectPlan(price,name){

document.getElementById("selectedPlan").innerHTML =
name+" ($"+price+")"

let html=""

for(let c in prices){
let amount=(price/prices[c]).toFixed(2)

html+=`
<div style="margin-top:10px;border-top:1px solid #333;padding-top:10px">
<b>${c}</b><br>
Amount: ${amount}<br>
Wallet: ${wallets[c]}
</div>`
}

document.getElementById("cryptoResult").innerHTML=html
}

async function sendReceipt(){
let tx=document.getElementById("receiptInput").value
if(!tx) return

await fetch("/api/submitReceipt",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({chat_id:user.id,image:tx})
})

alert(t("success"))
}

applyDir()
renderTexts()
loadProfile()
renderPlans()
loadPrices()

</script>

</body>
</html>
