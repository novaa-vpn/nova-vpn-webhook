<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
  font-family: sans-serif;
  background: linear-gradient(180deg,#0f172a,#020617);
  color:white;
  margin:0;
  padding:20px;
}

/* RTL / LTR */
body.rtl{direction:rtl;}
body.ltr{direction:ltr;}

/* container */
.container{
  max-width:420px;
  margin:auto;
}

/* header */
.header{
  text-align:center;
  margin-bottom:15px;
}

.header h2{
  margin:0;
}

.secure{
  font-size:13px;
  color:#94a3b8;
}

/* card */
.card{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:18px;
  border-radius:16px;
  margin-top:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* buttons */
button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
  font-size:15px;
  font-weight:bold;
}

.primary{
  background:linear-gradient(90deg,#22c55e,#16a34a);
}

.secondary{
  background:#1e293b;
}

/* lang */
.langs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:10px;
}

.lang-btn{
  padding:6px 10px;
  background:#1e293b;
}

/* input */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #334155;
  background:#020617;
  color:white;
  margin-top:10px;
}

/* status */
.status{
  font-size:13px;
  color:#94a3b8;
  margin-top:5px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>🔐 VPN Secure Panel</h2>
<div class="secure" id="secureText">Secure & Encrypted Connection</div>
</div>

<!-- 🌍 language -->
<div class="langs">
<button class="lang-btn" onclick="setLang('fa')">🇮🇷</button>
<button class="lang-btn" onclick="setLang('en')">🇺🇸</button>
</div>

<!-- 👤 profile -->
<div class="card">
<div id="info">Loading...</div>

<button class="primary" onclick="openSub()" id="subBtn"></button>

<div class="status" id="statusText"></div>
</div>

<!-- 💰 buy -->
<div class="card">

<h3 id="buyTitle"></h3>

<button class="secondary" onclick="buyPlan('1month')" id="plan1"></button>
<button class="secondary" onclick="buyPlan('3month')" id="plan3"></button>

<input type="text" id="receiptInput">

<button class="primary" onclick="sendReceipt()" id="sendReceiptBtn"></button>

</div>

</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

const user = tg.initDataUnsafe.user || { id: 1 }

let subLink = null
let lang = localStorage.getItem("lang") || "en"

// 🌍 متن حرفه‌ای
const texts = {
  en:{
    secure:"Secure & Encrypted Connection",
    loading:"Loading your secure profile...",
    balance:"Balance",
    sub:"Subscription",
    noSub:"Not active",
    active:"Active",
    inactive:"Inactive",
    open:"Open Dashboard",
    noSubAlert:"Your subscription is not active yet",
    buy:"Choose Your Plan",
    plan1:"1 Month Premium",
    plan3:"3 Months Premium",
    receiptPlaceholder:"Paste payment receipt link",
    sendReceipt:"Submit Payment",
    orderOk:"Your order has been submitted",
    receiptOk:"Receipt sent for verification",
    receiptError:"Please enter receipt link"
  },
  fa:{
    secure:"اتصال امن و رمزگذاری شده",
    loading:"در حال دریافت اطلاعات امن شما...",
    balance:"موجودی",
    sub:"وضعیت اشتراک",
    noSub:"غیرفعال",
    active:"فعال",
    inactive:"غیرفعال",
    open:"ورود به پنل اشتراک",
    noSubAlert:"اشتراک شما هنوز فعال نشده",
    buy:"انتخاب پلن اشتراک",
    plan1:"پلن ویژه ۱ ماهه",
    plan3:"پلن ویژه ۳ ماهه",
    receiptPlaceholder:"لینک رسید پرداخت را وارد کنید",
    sendReceipt:"ارسال رسید پرداخت",
    orderOk:"سفارش شما ثبت شد",
    receiptOk:"رسید برای بررسی ارسال شد",
    receiptError:"لطفا لینک رسید را وارد کنید"
  }
}

function t(key){ return texts[lang][key] }

// 🌍 زبان
function setLang(l){
  lang = l
  localStorage.setItem("lang", l)
  applyDirection()
  renderTexts()
  load()
}

// RTL
function applyDirection(){
  document.body.className = lang === "fa" ? "rtl" : "ltr"
}

// متن‌ها
function renderTexts(){
  document.getElementById("secureText").innerText = t("secure")
  document.getElementById("buyTitle").innerText = t("buy")
  document.getElementById("plan1").innerText = t("plan1")
  document.getElementById("plan3").innerText = t("plan3")
  document.getElementById("sendReceiptBtn").innerText = t("sendReceipt")
  document.getElementById("receiptInput").placeholder = t("receiptPlaceholder")
  document.getElementById("subBtn").innerText = t("open")
}

// 🚀 load
async function load(){

document.getElementById("info").innerHTML = t("loading")

let res = await fetch("/api/profile?chat_id="+user.id)
let data = await res.json()

subLink = data.sub_link

let status = data.sub_link ? t("active") : t("inactive")

document.getElementById("info").innerHTML =
"💰 "+t("balance")+": "+(data.balance ?? 0) +
"<br>🔗 "+t("sub")+": "+status

document.getElementById("statusText").innerText =
data.sub_link ? "✔ "+t("active") : "⚠ "+t("inactive")

}

// 🔗 open
function openSub(){
if(!subLink){
alert(t("noSubAlert"))
return
}
window.open(subLink,"_blank")
}

// 💰 buy
async function buyPlan(plan){
await fetch("/api/buy",{
  method:"POST",
  headers:{ "Content-Type":"application/json" },
  body:JSON.stringify({ chat_id:user.id, plan })
})
alert(t("orderOk"))
}

// 📤 receipt
async function sendReceipt(){
let img = document.getElementById("receiptInput").value
if(!img){ alert(t("receiptError")); return }

await fetch("/api/submitReceipt",{
  method:"POST",
  headers:{ "Content-Type":"application/json" },
  body:JSON.stringify({ chat_id:user.id, image:img })
})

alert(t("receiptOk"))
}

applyDirection()
renderTexts()
load()

</script>

</body>
</html>
