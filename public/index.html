<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<h2>VPN Panel</h2>

<div id="info">در حال لود...</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

const user = tg.initDataUnsafe.user

async function load(){

let res = await fetch("/api/profile?chat_id="+user.id)
let data = await res.json()

document.getElementById("info").innerHTML =
"Balance: "+(data?.balance ?? 0) +
"<br>Sub: "+(data?.sub_link ?? "ندارد")

}

load()

</script>

</body>
</html>
