<!DOCTYPE html>
<html>
<body>

<h2>Receipts</h2>

<div id="list"></div>

<script>

async function load(){

let res = await fetch("/api/adminReceipts",{
  headers:{
    "x-admin-token":"nova-admin-938472394823"
  }
})

let data = await res.json()

let html = ""

data.forEach(r=>{
  html += `
  <div style="border:1px solid #ccc; padding:10px; margin:10px;">
  <p>Chat ID: ${r.chat_id}</p>
  <img src="${r.image}" width="200"/>
  </div>
  `
})

document.getElementById("list").innerHTML = html

}

load()

</script>

</body>
</html>
